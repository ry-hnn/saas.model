                            alt="">
                        <div class="name">Treact</div>
                        <ul class="nav__link--list">
                            <li class="nav__link">
                                <a href="
                                nav__link--anchor
                                link__hover-effect
                                link__hover-effect--blue

                            </li>
                            <li class="nav__link">
                                <a href="
                                nav__link--anchor

                            </li>
                            <li class="nav__link">

                                nav__link--anchor
